services:
  # FundTracer - Unified Service (Backend + Frontend)
  - type: web
    name: fundtracer
    runtime: node
    region: oregon
    plan: starter
    buildCommand: |
      cd packages/core && npm install && npm run build && cd ../.. && \
      cd packages/web && npm install && npm run build && cd ../.. && \
      cd packages/server && npm install && npm run build && cd ../.. && \
      echo "Build complete"
    startCommand: cd packages/server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: DEFAULT_ALCHEMY_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FREE_DAILY_LIMIT
        value: 7
      # New API Keys (to be added via Render dashboard)
      - key: MORALIS_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: ANKR_API_KEY
        sync: false
      - key: DEBANK_API_KEY
        sync: false
      - key: QUICKNODE_API_KEY
        sync: false
      - key: QUICKNODE_RPC_URL
        sync: false
      - key: DUNE_API_KEY
        sync: false
    healthCheckPath: /health
