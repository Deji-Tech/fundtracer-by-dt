name: Deploy to Render

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy FundTracer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: |
          npm run build --workspace=@fundtracer/core
          npm run build --workspace=@fundtracer/web
          npm run build --workspace=@fundtracer/server
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Deploy to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}

      - name: Set Environment Variables
        run: |
          curl -s -X PUT \
            https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/env-vars \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "envVars": [
                {"key": "NODE_ENV", "value": "production"},
                {"key": "PORT", "value": "3001"},
                {"key": "FIREBASE_PROJECT_ID", "value": "${{ secrets.FIREBASE_PROJECT_ID }}"},
                {"key": "FIREBASE_CLIENT_EMAIL", "value": "${{ secrets.FIREBASE_CLIENT_EMAIL }}"},
                {"key": "FIREBASE_PRIVATE_KEY", "value": "${{ secrets.FIREBASE_PRIVATE_KEY }}"},
                {"key": "DEFAULT_ALCHEMY_API_KEY", "value": "${{ secrets.ALCHEMY_API_KEY }}"},
                {"key": "JWT_SECRET", "value": "${{ secrets.JWT_SECRET }}"},
                {"key": "FREE_DAILY_LIMIT", "value": "7"},
                {"key": "MORALIS_API_KEY", "value": "${{ secrets.MORALIS_API_KEY }}"},
                {"key": "ANKR_API_KEY", "value": "${{ secrets.ANKR_API_KEY }}"},
                {"key": "DEBANK_API_KEY", "value": "${{ secrets.DEBANK_API_KEY }}"},
                {"key": "QUICKNODE_API_KEY", "value": "${{ secrets.QUICKNODE_API_KEY }}"},
                {"key": "QUICKNODE_RPC_URL", "value": "${{ secrets.QUICKNODE_RPC_URL }}"},
                {"key": "DUNE_API_KEY", "value": "${{ secrets.DUNE_API_KEY }}"}
              ]
            }'

      - name: Wait for deployment
        run: sleep 30

      - name: Verify deployment
        run: |
          echo "✅ Deployment complete!"
          echo "Service URL: ${{ secrets.FRONTEND_URL }}"
          curl -s ${{ secrets.FRONTEND_URL }}/health || echo "Health check may need more time"
