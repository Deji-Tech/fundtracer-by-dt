<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FundTracer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="extension-container">
    
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <img src="logo.png" alt="FundTracer" onerror="this.style.display='none'">
        <span>FundTracer</span>
      </div>
      <div class="tier-badge" id="tierBadge">Free</div>
    </header>

    <!-- Chain Selector -->
    <section class="chain-section">
      <label class="section-label">Blockchain</label>
      <div class="chain-grid">
        <button class="chain-btn active" data-chain="ethereum" id="evmBtn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
          </svg>
          Ethereum
        </button>
        <button class="chain-btn" data-chain="arbitrum" id="arbBtn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="12" r="10"/>
          </svg>
          Arbitrum
        </button>
        <button class="chain-btn" data-chain="base" id="baseBtn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <rect x="3" y="3" width="18" height="18" rx="4"/>
          </svg>
          Base
        </button>
        <button class="chain-btn" data-chain="optimism" id="optBtn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="12" r="10"/>
          </svg>
          Optimism
        </button>
        <button class="chain-btn" data-chain="polygon" id="polyBtn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/>
          </svg>
          Polygon
        </button>
        <button class="chain-btn" data-chain="solana" id="solanaBtn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="12" r="10"/>
          </svg>
          Solana
        </button>
      </div>
    </section>

    <!-- Wallet Input -->
    <section class="wallet-section">
      <div class="wallet-input-wrapper">
        <input 
          type="text" 
          id="walletInput" 
          placeholder="Enter wallet address..."
          class="wallet-input"
        >
        <span class="chain-tag" id="chainTag">ETH</span>
      </div>
      <button class="btn-primary" id="scanBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8" x2="11" y2="14"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
        Analyze Wallet
      </button>
    </section>

    <!-- Loading -->
    <div class="loading" id="loading" style="display: none;">
      <div class="spinner"></div>
      <span>Analyzing wallet...</span>
    </div>

    <!-- Error -->
    <div class="error-message" id="errorMessage" style="display: none;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errorText">Error occurred</span>
    </div>

    <!-- Results Preview -->
    <section class="results-section glass-card" id="resultsSection" style="display: none;">
      <div class="results-header">
        <span class="results-title">Quick Results</span>
        <button class="btn-full" id="fullResultsBtn">View Full →</button>
      </div>
      
      <div class="result-card">
        <div class="result-row">
          <span class="result-label">Risk Level</span>
          <span class="result-value risk" id="riskLevel">Low</span>
        </div>
        <div class="result-row">
          <span class="result-label">Sybil Score</span>
          <span class="result-value" id="sybilScore">0%</span>
        </div>
        <div class="result-row">
          <span class="result-label">Transactions</span>
          <span class="result-value" id="totalTxs">0</span>
        </div>
        <div class="result-row">
          <span class="result-label">Balance</span>
          <span class="result-value" id="balance">0 ETH</span>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <a href="https://fundtracer.xyz/app-evm" target="_blank">Open App</a>
      <span class="divider">•</span>
      <a href="https://fundtracer.xyz/pricing" target="_blank">Get API Key</a>
      <span class="divider">•</span>
      <span id="version">v1.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
